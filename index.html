<style>
:root{
--bg:#13182e;
--bg2:#1b2140;
--panel:#222a4f;
--panel-soft:#2a3357;
--line:#343d68;
--ink:#eceaf6;
--ink-soft:#9aa0c4;
--ink-faint:#646b96;
--glow:#f3b65c;
--glow-soft:#f7c97e;
--glow-deep:#e8973f;
--rose:#e8849c;
--r:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
background:
radial-gradient(120% 80% at 50% -10%, #2a2f5a 0%, var(--bg2) 38%, var(--bg) 78%);
background-attachment:fixed;
color:var(--ink);
min-height:100%;
padding:max(20px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
display:flex;justify-content:center;
-webkit-font-smoothing:antialiased;
}
.wrap{width:100%;max-width:440px;}
/* header */
header{display:flex;align-items:flex-end;justify-content:space-between;margin:6px 2px 18px;}
.brand{display:flex;flex-direction:column;gap:2px;}
.title{
font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
font-size:30px;font-weight:600;letter-spacing:.14em;
background:linear-gradient(180deg,#fff 0%,var(--glow-soft) 130%);
-webkit-background-clip:text;background-clip:text;color:transparent;
}
.subtitle{font-size:11.5px;color:var(--ink-faint);letter-spacing:.22em;padding-left:.2em;}
.streak{text-align:right;line-height:1.1;}
.streak .num{font-size:26px;font-weight:700;color:var(--glow);font-variant-numeric:tabular-nums;}
.streak .num.cold{color:var(--ink-faint);}
.streak .lbl{font-size:10.5px;color:var(--ink-faint);letter-spacing:.12em;}
/* tabs */
.tabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:18px;}
.tab{flex:1;background:none;border:none;color:var(--ink-soft);font:inherit;font-size:13px;font-weight:600;letter-spacing:.04em;padding:9px 6px;border-radius:10px;cursor:pointer;transition:.18s;}
.tab.active{background:linear-gradient(180deg,var(--panel),var(--panel-soft));color:var(--glow);box-shadow:0 4px 12px -8px #000;}
.tab:active{transform:translateY(1px);}
/* today card */
.card{
background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
border:1px solid var(--line);border-radius:var(--r);
padding:20px 18px 18px;margin-bottom:18px;position:relative;overflow:hidden;
box-shadow:0 12px 34px -18px rgba(0,0,0,.7);
}
.card::before{
content:"";position:absolute;top:-60px;left:50%;transform:translateX(-50%);
width:200px;height:120px;border-radius:50%;
background:radial-gradient(closest-side,rgba(243,182,92,.16),transparent);
pointer-events:none;opacity:0;transition:opacity .6s;
}
.card.lit::before{opacity:1;}
.card-date{font-size:12.5px;color:var(--ink-soft);letter-spacing:.05em;margin-bottom:12px;}
.field{margin-bottom:14px;}
.field:last-of-type{margin-bottom:0;}
.card-q{font-size:16px;font-weight:600;margin-bottom:10px;letter-spacing:.02em;}
.card-q.sub{font-size:14px;display:flex;align-items:center;gap:8px;}
.card-q .yo{color:var(--glow);}
.card-q .le{color:var(--rose);}
.opt{font-size:10px;font-weight:600;color:var(--ink-faint);border:1px solid var(--line);border-radius:6px;padding:1px 6px;letter-spacing:.08em;}
textarea{
width:100%;min-height:80px;resize:none;border:none;outline:none;
background:rgba(255,255,255,.04);border:1px solid var(--line);
border-radius:12px;padding:13px 14px;color:var(--ink);
font:inherit;font-size:15px;line-height:1.6;transition:border-color .2s,background .2s;
}
#lesson{min-height:62px;}
textarea::placeholder{color:var(--ink-faint);}
textarea:focus{border-color:var(--glow-deep);background:rgba(243,182,92,.05);}
#lesson:focus{border-color:var(--rose);background:rgba(232,132,156,.05);}
.row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:12px;}
.hint{font-size:11px;color:var(--ink-faint);flex:1;}
.save{
border:none;border-radius:11px;padding:11px 22px;font:inherit;font-size:14px;font-weight:700;
letter-spacing:.06em;cursor:pointer;color:#2a1c06;white-space:nowrap;
background:linear-gradient(180deg,var(--glow-soft),var(--glow-deep));
box-shadow:0 6px 16px -8px var(--glow-deep);transition:transform .12s,filter .2s,opacity .2s;
}
.save:active{transform:translateY(1px);}
.save:disabled{opacity:.4;cursor:default;box-shadow:none;filter:grayscale(.3);}
.saved-flash{position:absolute;inset:0;background:radial-gradient(closest-side,rgba(243,182,92,.22),transparent 70%);opacity:0;pointer-events:none;}
@keyframes flash{0%{opacity:0;}25%{opacity:1;}100%{opacity:0;}}
.saved-flash.go{animation:flash .9s ease-out;}
/* calendar */
.cal{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:16px 14px 18px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:17px;font-weight:600;letter-spacing:.08em;}
.nav{background:none;border:1px solid var(--line);color:var(--ink-soft);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;display:grid;place-items:center;transition:.18s;}
.nav:hover{border-color:var(--glow-deep);color:var(--glow);}
.nav:disabled{opacity:.28;cursor:default;}
.dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.dow span{text-align:center;font-size:10.5px;color:var(--ink-faint);letter-spacing:.04em;padding:4px 0;}
.dow span.sun{color:#d98a8a;}.dow span.sat{color:#8aa6d9;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cell{position:relative;aspect-ratio:1;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:13.5px;color:var(--ink-soft);cursor:pointer;border:1px solid transparent;transition:.16s;font-variant-numeric:tabular-nums;}
.cell.empty{cursor:default;}
.cell.future{color:var(--ink-faint);opacity:.4;cursor:default;}
.cell:not(.empty):not(.future):not(.lit):hover{background:var(--panel-soft);}
.cell.lit{color:#2a1c06;font-weight:700;background:radial-gradient(closest-side,var(--glow-soft),var(--glow-deep));box-shadow:0 0 14px -2px rgba(243,182,92,.6);}
.cell.today{border-color:var(--glow-deep);}
.cell.today.lit{border-color:#fff3;}
.cell.sel{outline:2px solid var(--ink);outline-offset:1px;}
.cell .dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--rose);}
.cell.lit .dot{background:#5a2330;}
@media (prefers-reduced-motion:no-preference){
.cell.lit::after{content:"";position:absolute;inset:0;border-radius:11px;box-shadow:0 0 0 0 rgba(243,182,92,.5);animation:pulse 2.6s ease-out infinite;}
}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(243,182,92,.45);}70%{box-shadow:0 0 0 7px rgba(243,182,92,0);}100%{box-shadow:0 0 0 0 rgba(243,182,92,0);}}
/* lists */
.list-title{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:16px;letter-spacing:.08em;margin:2px 2px 14px;color:var(--ink);}
.list-title .n{font-size:12px;color:var(--ink-faint);font-family:inherit;margin-left:8px;}
.list{display:flex;flex-direction:column;gap:8px;}
.litem{text-align:left;width:100%;background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);border:1px solid var(--line);border-radius:14px;padding:13px 15px;cursor:pointer;font:inherit;color:var(--ink);transition:.16s;}
.litem:hover{border-color:var(--glow-deep);}
.litem:active{transform:translateY(1px);}
.litem .d{font-size:11.5px;color:var(--ink-soft);letter-spacing:.04em;margin-bottom:5px;}
.litem .t{font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
#luckList .litem{border-left:3px solid rgba(243,182,92,.45);}
#lessonList .litem{border-left:3px solid rgba(232,132,156,.45);}
.empty-msg{text-align:center;color:var(--ink-faint);font-size:13px;padding:48px 0;letter-spacing:.04em;line-height:1.8;}
/* footer note */
.backup{display:flex;gap:10px;justify-content:center;margin-top:20px;}
.bk{flex:1;max-width:180px;background:none;border:1px solid var(--line);color:var(--ink-soft);
border-radius:11px;padding:11px 12px;font:inherit;font-size:12.5px;letter-spacing:.04em;cursor:pointer;transition:.18s;}
.bk:hover{border-color:var(--glow-deep);color:var(--glow);}
.bk:active{transform:translateY(1px);}
.foot{text-align:center;font-size:10.5px;color:var(--ink-faint);margin-top:14px;letter-spacing:.06em;line-height:1.7;}
.foot b{color:var(--ink-soft);font-weight:600;}
[hidden]{display:none!important;}
*:focus-visible{outline:2px solid var(--glow);outline-offset:2px;}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="brand">
<div class="title">一日一運</div>
<div class="subtitle">ICHINICHI ICHIUN</div>
</div>
<div class="streak">
<div class="num" id="streakNum">0</div>
<div class="lbl" id="streakLbl">日つづけて灯した</div>
</div>
</header>

<div class="tabs">
<button class="tab active" id="tab-home">記録</button>
<button class="tab" id="tab-luck">運の一覧</button>
<button class="tab" id="tab-lesson">教訓の一覧</button>
</div>

<!-- ===== 記録ビュー ===== -->
<div id="view-home">
<section class="card" id="card">
<div class="saved-flash" id="flash"></div>
<div class="card-date" id="cardDate">—</div>

<div class="field">
<div class="card-q">今日、<span class="yo">運が良かった</span>こと</div>
<textarea id="luck" maxlength="600" placeholder="小さなことでええよ。信号がぜんぶ青やった、とか。"></textarea>
</div>

<div class="field">
<div class="card-q sub">今日の<span class="le">教訓・学んだこと</span><span class="opt">任意</span></div>
<textarea id="lesson" maxlength="600" placeholder="なくてもええ。気づき・反省・あとで効くメモ、なんでも。"></textarea>
</div>

<div class="row">
<div class="hint" id="hint"></div>
<button class="save" id="saveBtn" disabled>灯す</button>
</div>
</section>

<section class="cal">
<div class="cal-head">
<button class="nav" id="prev" aria-label="前の月">‹</button>
<div class="cal-month" id="calMonth">—</div>
<button class="nav" id="next" aria-label="次の月">›</button>
</div>
<div class="dow">
<span class="sun">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span>
</div>
<div class="grid" id="grid"></div>
</section>
</div>

<!-- ===== 運の一覧ビュー ===== -->
<div id="view-luck" hidden>
<div class="list-title">運の記録<span class="n" id="luckCount"></span></div>
<div class="list" id="luckList"></div>
</div>

<!-- ===== 教訓の一覧ビュー ===== -->
<div id="view-lesson" hidden>
<div class="list-title">教訓・学んだこと<span class="n" id="lessonCount"></span></div>
<div class="list" id="lessonList"></div>
</div>

<div class="backup">
<button id="exportBtn" class="bk">バックアップを書き出す</button>
<button id="importBtn" class="bk">読み込む</button>
<input type="file" id="importFile" accept="application/json,.json" hidden>
</div>

<div class="foot" id="foot">
記録はこの端末のなかだけに残ります。<br><b>誰にも共有されません。</b>
</div>
</div>

<script>
// ---- storage: tries 3 layers so data survives in the most contexts ----
// 1) window.storage … チャット内アーティファクトの保存領域
// 2) localStorage … 端末でファイルとして開いたときの保存領域（閉じても残る）
// 3) memory … 上2つが使えない時の最後の保険（閉じると消える）
// ※ キーもデータ構造も従来どおり。各日 = {text:運, lesson:教訓, ts}
//    既存データは text のみ → そのまま運として読まれる（教訓は空扱い）
const KEY="ichinichi-ichiun-entries";
let memCache=null;
async function storeGet(){
try{ if(window.storage){const r=await window.storage.get(KEY);
if(r&&r.value){const o=JSON.parse(r.value); if(Object.keys(o).length) return o;}} }catch(e){}
try{ const v=localStorage.getItem(KEY);
if(v){const o=JSON.parse(v); if(Object.keys(o).length) return o;} }catch(e){}
return memCache?JSON.parse(memCache):{};
}
async function storeSet(obj){
const s=JSON.stringify(obj); memCache=s;
try{ localStorage.setItem(KEY,s); }catch(e){}
try{ if(window.storage){await window.storage.set(KEY,s);} }catch(e){}
}

// ---- date helpers (local time, no tz drift) ----
const todayKey=(()=>{const d=new Date();return fmt(d);})();
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parse(k){const[a,b,c]=k.split("-").map(Number);return new Date(a,b-1,c);}
function addDays(k,n){const d=parse(k);d.setDate(d.getDate()+n);return fmt(d);}

let entries={};
let viewY, viewM;       // calendar shown month
let selected=todayKey;  // which day the card edits
const $=id=>document.getElementById(id);
const luckTA=()=>$("luck"), lessonTA=()=>$("lesson");

function jpDate(k){
const d=parse(k);const w="日月火水木金土"[d.getDay()];
return `${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}
function jpDateFull(k){
const d=parse(k);const w="日月火水木金土"[d.getDay()];
return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}

function computeStreak(){
// streak は従来どおり「運（text）を灯した連続日数」
let n=0, k=todayKey;
if(!entries[k]?.text) k=addDays(todayKey,-1); // grace: today not written yet
while(entries[k]?.text){n++;k=addDays(k,-1);}
return n;
}
function renderStreak(){
const n=computeStreak();
$("streakNum").textContent=n;
$("streakNum").classList.toggle("cold",n===0);
$("streakLbl").textContent = n===0 ? "今夜から灯そう" : "日つづけて灯した";
}

function renderCard(){
const isFuture=selected>todayKey;
const e=entries[selected];
$("cardDate").textContent = (selected===todayKey?"今日 ":"") + jpDate(selected);
luckTA().value = e?.text || "";
lessonTA().value = e?.lesson || "";
luckTA().disabled = isFuture;
lessonTA().disabled = isFuture;
$("card").classList.toggle("lit",!!e?.text);
$("saveBtn").textContent = e?.text ? "灯しなおす" : "灯す";
updateBtn();
if(isFuture){$("hint").textContent="まだ来てへん日やで";}
else if(e?.text&&e?.lesson){$("hint").textContent="灯ってる ◍ ／ 教訓あり";}
else if(e?.text){$("hint").textContent="灯ってる ◍";}
else if(e?.lesson){$("hint").textContent="教訓だけ記録あり";}
else{$("hint").textContent="";}
}

function updateBtn(){
const fut=luckTA().disabled;
const l=luckTA().value.trim();
const m=lessonTA().value.trim();
const cl=entries[selected]?.text||"";
const cm=entries[selected]?.lesson||"";
const changed=(l!==cl)||(m!==cm);
const hasContent=(l!=="")||(m!=="");
$("saveBtn").disabled = fut || !changed || !hasContent;
}

function renderCal(){
const first=new Date(viewY,viewM,1);
const startPad=first.getDay();
const days=new Date(viewY,viewM+1,0).getDate();
$("calMonth").textContent=`${viewY}年 ${viewM+1}月`;
const g=$("grid");g.innerHTML="";
for(let i=0;i<startPad;i++){const e=document.createElement("div");e.className="cell empty";g.appendChild(e);}
for(let d=1;d<=days;d++){
const k=fmt(new Date(viewY,viewM,d));
const e=entries[k];
const cell=document.createElement("div");
cell.className="cell";cell.textContent=d;
if(e?.text)cell.classList.add("lit");
if(k===todayKey)cell.classList.add("today");
if(k>todayKey)cell.classList.add("future");
if(k===selected)cell.classList.add("sel");
if(e?.lesson){const dot=document.createElement("span");dot.className="dot";cell.appendChild(dot);} // 教訓あり = 小さなドット
if(k<=todayKey){
cell.tabIndex=0;cell.setAttribute("role","button");
cell.setAttribute("aria-label",jpDate(k)+(e?.text?"・灯ってる":"")+(e?.lesson?"・教訓あり":""));
const pick=()=>{selected=k;renderCard();renderCal();
if(selected===todayKey||!entries[selected]?.text)luckTA().focus({preventScroll:true});};
cell.onclick=pick;
cell.onkeydown=ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();pick();}};
}
g.appendChild(cell);
}
const now=new Date();
$("next").disabled = (viewY>now.getFullYear()||(viewY===now.getFullYear()&&viewM>=now.getMonth()));
}

// ---- list views ----
function renderLists(){
renderList("luckList","text","まだ灯した日がないで。\n今夜ひとつ灯そか。","luckCount");
renderList("lessonList","lesson","まだ教訓の記録がないで。\n気づいたこと、ひとつでも。","lessonCount");
}
function renderList(elId,field,emptyMsg,countId){
const wrap=$(elId);wrap.innerHTML="";
const keys=Object.keys(entries)
.filter(k=>entries[k]?.[field]&&String(entries[k][field]).trim()!=="")
.sort().reverse();
if(countId)$(countId).textContent = keys.length ? `${keys.length}件` : "";
if(!keys.length){
const d=document.createElement("div");d.className="empty-msg";d.textContent=emptyMsg;wrap.appendChild(d);return;
}
for(const k of keys){
const item=document.createElement("button");
item.className="litem";item.type="button";
const dd=document.createElement("div");dd.className="d";dd.textContent=jpDateFull(k);
const tt=document.createElement("div");tt.className="t";tt.textContent=entries[k][field];
item.appendChild(dd);item.appendChild(tt);
item.onclick=()=>{
selected=k;const t=parse(k);viewY=t.getFullYear();viewM=t.getMonth();
switchView("home");renderCard();renderCal();
window.scrollTo({top:0,behavior:"smooth"});
};
wrap.appendChild(item);
}
}

function switchView(v){
["home","luck","lesson"].forEach(name=>{
$("view-"+name).hidden = (name!==v);
$("tab-"+name).classList.toggle("active",name===v);
});
if(v!=="home")renderLists();
}

async function save(){
const l=luckTA().value.trim();
const m=lessonTA().value.trim();
if(!l&&!m)return;
const prev=entries[selected]||{};
entries[selected]={text:l,lesson:m,ts:Date.now()};
await storeSet(entries);
$("card").classList.toggle("lit",!!l);
const f=$("flash");f.classList.remove("go");void f.offsetWidth;f.classList.add("go");
renderStreak();renderCard();renderCal();renderLists();
}

function flashFoot(msg){
const f=$("foot");const old=f.innerHTML;
f.innerHTML="<b style='color:var(--glow)'>"+msg+"</b>";
setTimeout(()=>{f.innerHTML=old;},2200);
}

function exportData(){
const blob=new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;a.download="ichinichi-ichiun_"+todayKey+".json";
document.body.appendChild(a);a.click();a.remove();
setTimeout(()=>URL.revokeObjectURL(url),1000);
flashFoot("書き出した ✓ 大事に持っときや");
}

function importData(file){
const r=new FileReader();
r.onload=async()=>{
try{
const data=JSON.parse(r.result);
if(typeof data!=="object"||Array.isArray(data))throw 0;
let added=0;
for(const k in data){
if(/^\d{4}-\d{2}-\d{2}$/.test(k)&&data[k]&&typeof data[k]==="object"){
const t = typeof data[k].text==="string" ? data[k].text : "";
const ls = typeof data[k].lesson==="string" ? data[k].lesson : "";
if(t===""&&ls==="")continue;
entries[k]={text:t,lesson:ls,ts:data[k].ts||Date.now()};
added++;
}
}
await storeSet(entries);
renderStreak();renderCard();renderCal();renderLists();
flashFoot(added+"件 読み込んだ ✓");
}catch(e){ flashFoot("読み込めへんかった。ファイル確認して"); }
};
r.readAsText(file);
}

function bind(){
luckTA().addEventListener("input",updateBtn);
lessonTA().addEventListener("input",updateBtn);
const cmdEnter=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){e.preventDefault();if(!$("saveBtn").disabled)save();}};
luckTA().addEventListener("keydown",cmdEnter);
lessonTA().addEventListener("keydown",cmdEnter);
$("saveBtn").onclick=save;
$("prev").onclick=()=>{viewM--;if(viewM<0){viewM=11;viewY--;}renderCal();};
$("next").onclick=()=>{const now=new Date();if(viewY>now.getFullYear()||(viewY===now.getFullYear()&&viewM>=now.getMonth()))return;viewM++;if(viewM>11){viewM=0;viewY++;}renderCal();};
$("exportBtn").onclick=exportData;
$("importBtn").onclick=()=>$("importFile").click();
$("importFile").onchange=e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value="";};
$("tab-home").onclick=()=>switchView("home");
$("tab-luck").onclick=()=>switchView("luck");
$("tab-lesson").onclick=()=>switchView("lesson");
}

(async function init(){
entries=await storeGet();
const t=parse(todayKey);viewY=t.getFullYear();viewM=t.getMonth();
bind();renderStreak();renderCard();renderCal();
})();
</script>
</body>
